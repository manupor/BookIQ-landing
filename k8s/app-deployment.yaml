apiVersion: v1
kind: Secret
metadata:
  name: app-secret
type: Opaque
stringData:
  DATABASE_URL: "postgresql://bookiq:changeme_in_production@postgres:5432/bookiq?schema=public"
  NEXTAUTH_SECRET: "generate-with-openssl-rand-base64-32"
  NEXTAUTH_URL: "https://your-domain.com"
  GOOGLE_CLIENT_ID: "your-google-client-id"
  GOOGLE_CLIENT_SECRET: "your-google-client-secret"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookiq-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bookiq-app
  template:
    metadata:
      labels:
        app: bookiq-app
    spec:
      initContainers:
      - name: migrate
        image: your-registry/bookiq:latest
        command: ["npx", "prisma", "migrate", "deploy"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DATABASE_URL
      containers:
      - name: bookiq
        image: your-registry/bookiq:latest
        ports:
        - containerPort: 3000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: DATABASE_URL
        - name: NEXTAUTH_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: NEXTAUTH_SECRET
        - name: NEXTAUTH_URL
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: NEXTAUTH_URL
        - name: GOOGLE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: GOOGLE_CLIENT_ID
        - name: GOOGLE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secret
              key: GOOGLE_CLIENT_SECRET
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bookiq-app
spec:
  selector:
    app: bookiq-app
  ports:
  - port: 80
    targetPort: 3000
  type: LoadBalancer
